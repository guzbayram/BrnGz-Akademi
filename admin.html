<!DOCTYPE html>
<html lang="tr" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrnGz Akademi — Admin Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
:root{
  --p:#461599;--pd:#3a1180;--pl:#6c45c0;--pb:#eaddff;--pb2:#d1bcff;
  --bg:#fef7ff;--s-low:#f8f1fc;--s-cnt:#f2ebf7;--s-high:#ede6f1;--s-highest:#e7e0eb;--s-lowest:#fff;
  --tx:#1d1a22;--mu:#494453;--br:#cbc3d5;
  --g:#16a34a;--r:#dc2626;--o:#e07020;--amb:#d97706;
  --shadow-lg:0 8px 24px rgba(70,21,153,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;}

/* ── Sidebar ── */
.sidebar{
  width:260px;flex-shrink:0;height:100vh;position:sticky;top:0;
  background:var(--s-low);
  display:flex;flex-direction:column;
  padding:28px 16px;
  border-right:1px solid rgba(203,195,213,.2);
  overflow-y:auto;
}
.sb-brand{padding:0 12px;margin-bottom:32px;}
.sb-brand h1{font-family:'Manrope',sans-serif;font-size:18px;font-weight:900;color:var(--p);letter-spacing:-.02em;}
.sb-brand p{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.15em;margin-top:2px;}

.sb-profile{display:flex;align-items:center;gap:12px;padding:12px;background:var(--s-lowest);border-radius:16px;margin-bottom:24px;box-shadow:0 2px 8px rgba(70,21,153,.05);}
.sb-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--pl),var(--p));display:flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;}
.sb-info h3{font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;color:var(--tx);line-height:1.2;}
.sb-info p{font-size:10px;color:var(--mu);font-weight:600;margin-top:2px;}
.sb-role{display:inline-block;padding:2px 8px;background:#fef3e8;color:var(--o);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;border-radius:99px;margin-top:3px;}

.sb-section-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:var(--mu);padding:8px 12px 4px;margin-top:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:none;background:none;color:var(--mu);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;text-align:left;text-decoration:none;}
.nav-item:hover{background:var(--s-cnt);color:var(--tx);}
.nav-item.active{background:var(--pb);color:var(--p);}
.nav-item.active .material-symbols-outlined{color:var(--p);}
.nav-item .material-symbols-outlined{font-size:18px;}
.nav-item .badge{margin-left:auto;background:var(--p);color:#fff;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:800;}
.nav-item.danger:hover{background:#fef2f2;color:var(--r);}

.sb-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(203,195,213,.3);}
.sb-logout{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:none;background:none;color:var(--mu);font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .15s;}
.sb-logout:hover{background:#fef2f2;color:var(--r);}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-y:auto;}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(254,247,255,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(203,195,213,.2);
  padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar-left .topbar-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;color:var(--tx);}
.topbar-left .topbar-sub{font-size:12px;color:var(--mu);font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mu);transition:all .15s;}
.icon-btn:hover{background:var(--s-cnt);color:var(--p);}

/* ── Content ── */
.content{padding:32px;flex:1;}
.tp{display:none;}.tp.on{display:block;}

/* ── Stat Cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--s-lowest);border-radius:16px;padding:22px;box-shadow:var(--shadow-lg);transition:all .2s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(70,21,153,.12);}
.stat-card.accent{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;}
.stat-card.accent .stat-label{color:rgba(255,255,255,.7);}
.stat-card.accent .stat-val{color:#fff;}
.stat-icon{width:44px;height:44px;border-radius:12px;background:rgba(216,198,254,.25);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.stat-icon .material-symbols-outlined{font-size:20px;color:var(--p);}
.stat-card.accent .stat-icon{background:rgba(255,255,255,.15);}
.stat-card.accent .stat-icon .material-symbols-outlined{color:#fff;}
.stat-val{font-family:'Manrope',sans-serif;font-size:36px;font-weight:900;color:var(--tx);line-height:1;margin-bottom:4px;}
.stat-label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;}

/* ── Section Header ── */
.sec-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.sec-title{font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;color:var(--tx);letter-spacing:-.02em;}
.sec-sub{font-size:13px;color:var(--mu);font-weight:500;margin-top:4px;}
.sec-actions{display:flex;gap:8px;}

/* ── Buttons ── */
.btn-primary{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;border-radius:99px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;box-shadow:0 4px 12px rgba(70,21,153,.25);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(70,21,153,.35);}
.btn-ghost{background:transparent;border:1.5px solid rgba(203,195,213,.6);color:var(--p);border-radius:99px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.btn-ghost:hover{background:var(--pb);}
.btn-danger{background:#fef2f2;border:none;color:var(--r);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-danger:hover{background:var(--r);color:#fff;}
.btn-sm{border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-sm.purple{background:var(--pb);color:var(--p);}.btn-sm.purple:hover{background:var(--p);color:#fff;}
.btn-sm.orange{background:#fef3e8;color:var(--o);}.btn-sm.orange:hover{background:var(--o);color:#fff;}
.btn-sm.blue{background:#eff6ff;color:#2563eb;}.btn-sm.blue:hover{background:#2563eb;color:#fff;}
.btn-sm.red{background:#fef2f2;color:var(--r);}.btn-sm.red:hover{background:var(--r);color:#fff;}
.btn-sm.dark{background:#1e293b;color:#fff;}.btn-sm.dark:hover{opacity:.85;}

/* ── Table ── */
.table-wrap{background:var(--s-lowest);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-lg);}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(203,195,213,.2);}
.table-head-title{font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;color:var(--tx);}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--s-low);padding:12px 20px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);white-space:nowrap;}
tbody td{padding:14px 20px;font-size:13px;border-top:1px solid rgba(203,195,213,.12);vertical-align:middle;}
tbody tr{transition:background .12s;}
tbody tr:hover td{background:var(--s-low);}
.uav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.uav.student{background:var(--pb);color:var(--p);}
.uav.teacher{background:#f0fdf4;color:var(--g);}
.uav.admin{background:#fef3e8;color:var(--o);}
.pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
.pill.student{background:var(--pb);color:var(--p);}
.pill.teacher{background:#f0fdf4;color:var(--g);}
.pill.admin{background:#fef3e8;color:var(--o);}
.td-actions{display:flex;gap:6px;flex-wrap:wrap;}

/* ── Summary Rows ── */
.summary-grid{display:grid;grid-template-columns:3fr 2fr;gap:20px;margin-bottom:28px;}
.card{background:var(--s-lowest);border-radius:20px;padding:26px;box-shadow:var(--shadow-lg);}
.card-title{font-family:'Manrope',sans-serif;font-size:14px;font-weight:800;color:var(--tx);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title .material-symbols-outlined{font-size:18px;color:var(--p);}

/* Progress */
.prog-row{margin-bottom:16px;}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-name{font-size:13px;font-weight:600;color:var(--tx);}
.prog-pct{font-size:13px;font-weight:800;color:var(--p);}
.prog-track{height:8px;background:var(--s-high);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--pl));}

/* ── Loading ── */
.ld{text-align:center;padding:60px;color:var(--mu);}
.sp{width:32px;height:32px;border:3px solid var(--s-high);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.es{text-align:center;padding:60px;color:var(--mu);}
.es .ic{font-size:40px;margin-bottom:12px;}

/* ── Modal ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.mo.on{display:flex;}
.md{background:#fff;border-radius:24px;padding:32px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.18);animation:fadeUp .2s ease both;max-height:90vh;overflow-y:auto;}
.md h3{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;color:var(--p);margin-bottom:20px;}
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);margin-bottom:6px;}
.fg input,.fg select{width:100%;padding:12px 14px;border:1.5px solid rgba(203,195,213,.5);border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;color:var(--tx);background:var(--s-low);outline:none;transition:all .2s;}
.fg input:focus,.fg select:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(70,21,153,.1);}
.mda{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* ── Fas check list ── */
.fas-check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s-low);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:background .12s;}
.fas-check-item:hover{background:var(--pb);}
.fas-check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--p);cursor:pointer;}

/* ── Highlight card ── */
.highlight-card{border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:16px;}
.highlight-card.purple{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;}
.highlight-card.green{background:linear-gradient(135deg,#16a34a,#4ade80);color:#fff;}
.highlight-card.orange{background:linear-gradient(135deg,var(--o),#f59e0b);color:#fff;}
.highlight-card .material-symbols-outlined{font-size:32px;opacity:.8;}

/* ── Mobile ── */
@media(max-width:960px){
  .sidebar{display:none;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .summary-grid{grid-template-columns:1fr;}
  .content{padding:20px 16px;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.tp.on > *{animation:fadeUp .3s ease both;}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sb-brand">
    <div class="logo-mark"><span class="material-symbols-outlined">school</span></div>
    <div>
      <h1>BrnGz Akademi</h1>
      <p>Admin Paneli</p>
    </div>
  </div>

  <div class="sb-profile" id="sb-profile">
    <div class="sb-av" id="sb-av">A</div>
    <div class="sb-info">
      <h3 id="sb-name">Admin</h3>
      <p>Sistem Yöneticisi</p>
      <span class="sb-role">Admin</span>
    </div>
  </div>

  <div class="sb-section-label">Menü</div>
  <button class="nav-item active" onclick="switchTab('tGenel',this)">
    <span class="material-symbols-outlined">home</span>
    Anasayfa
  </button>
  <button class="nav-item" onclick="switchTab('tKullanici',this)">
    <span class="material-symbols-outlined">manage_accounts</span>
    Kullanıcılar
    <span class="badge" id="user-count-badge">—</span>
  </button>
  <button class="nav-item" onclick="switchTab('tOgr',this)">
    <span class="material-symbols-outlined">groups</span>
    Öğrenci İstatistikleri
  </button>
  <button class="nav-item" onclick="switchTab('tFas',this)">
    <span class="material-symbols-outlined">auto_stories</span>
    Fasiküller
  </button>



  <div class="sb-footer">
    <button class="sb-logout" id="logout-btn">
      <span class="material-symbols-outlined">logout</span>
      Çıkış Yap
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main">

  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbar-title">Genel Bakış</div>
      <div class="topbar-sub" id="topbar-sub">Sistem genelindeki duruma bakın</div>
    </div>
    <div class="topbar-right">
      <button id="add-user-btn" onclick="openAddUser()" style="display:none;align-items:center;gap:6px;padding:7px 16px;border-radius:99px;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(70,21,153,.25);transition:all .2s;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform=''">
        <span class="material-symbols-outlined" style="font-size:16px;">person_add</span>Kullanıcı Ekle
      </button>
      <button class="icon-btn"><span class="material-symbols-outlined">notifications</span></button>
      <button onclick="document.getElementById('logout-btn').click()" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;border:1.5px solid rgba(203,195,213,.6);background:none;color:var(--mu);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='#fef2f2';this.style.color='var(--r)';this.style.borderColor='#fecaca'" onmouseout="this.style.background='none';this.style.color='var(--mu)';this.style.borderColor='rgba(203,195,213,.6)'">
        <span class="material-symbols-outlined" style="font-size:16px;">logout</span>Çıkış Yap
      </button>

    </div>
  </header>

  <div class="content">

    <!-- Genel Bakış -->
    <div class="tp on" id="tGenel">
      <div id="tGenel-inner" class="ld"><div class="sp"></div>Yükleniyor...</div>
    </div>

    <!-- Kullanıcılar -->
    <div class="tp" id="tKullanici">
      <div id="tKullanici-inner" class="ld"><div class="sp"></div>Yükleniyor...</div>
    </div>

    <!-- Öğrenci İstatistikleri -->
    <div class="tp" id="tOgr">
      <div id="tOgr-inner" class="ld"><div class="sp"></div>Yükleniyor...</div>
    </div>

    <!-- Öğretmen İstatistikleri -->
    <div class="tp" id="tOgt">
      <div id="tOgt-inner" class="ld"><div class="sp"></div>Yükleniyor...</div>
    </div>

    <!-- Fasiküller -->
    <div class="tp" id="tFas">
      <div id="tFas-inner"></div>
    </div>

  </div>
</div>

<!-- Modals -->
<div class="mo" id="mAdd">
  <div class="md">
    <h3>Yeni Kullanıcı</h3>
    <div class="fg"><label>Ad Soyad</label><input type="text" id="nn" placeholder="Ali Yılmaz"></div>
    <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="nu" placeholder="aliyilmaz"></div>
    <div class="fg"><label>Şifre</label><input type="text" id="np" placeholder="şifre123"></div>
    <div class="fg"><label>Rol</label>
      <select id="nr" onchange="toggleTA()">
        <option value="student">Öğrenci</option>
        <option value="teacher">Öğretmen</option>
      </select>
    </div>
    <div class="fg" id="tag"><label>Öğretmen Ata</label><select id="nt"><option value="">-- Öğretmen seç --</option></select></div>
    <div class="mda">
      <button class="btn-ghost" onclick="closeModal('mAdd')">İptal</button>
      <button class="btn-primary" id="sbtn" onclick="saveUser()">Kaydet</button>
    </div>
  </div>
</div>

<div class="mo" id="mReset">
  <div class="md">
    <h3>İstatistikleri Sıfırla</h3>
    <p id="rtxt" style="font-size:14px;color:var(--mu);font-weight:600;margin-bottom:8px;"></p>
    <div class="mda">
      <button class="btn-ghost" onclick="closeModal('mReset')">İptal</button>
      <button class="btn-danger" onclick="doReset()">Sıfırla</button>
    </div>
  </div>
</div>

<div class="mo" id="mCred">
  <div class="md">
    <h3>Giriş Bilgileri</h3>
    <div id="credbox" style="background:var(--s-low);border-radius:12px;padding:16px;font-size:14px;line-height:2;color:var(--p);font-weight:600;"></div>
    <div class="mda">
      <button class="btn-ghost" onclick="closeModal('mCred')">Kapat</button>
      <button class="btn-primary" onclick="doCopy()">Kopyala</button>
    </div>
  </div>
</div>

<div class="mo" id="mFasAssign">
  <div class="md" style="max-width:500px;">
    <h3>Fasikül Erişimi</h3>
    <p id="fasAssignTxt" style="font-size:13px;color:var(--mu);font-weight:600;margin-bottom:14px;"></p>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button class="btn-sm purple" onclick="fasToggleAll(true)">Tümünü Seç</button>
      <button class="btn-sm" style="background:var(--s-high);color:var(--mu);" onclick="fasToggleAll(false)">Tümünü Kaldır</button>
    </div>
    <div id="fasCheckList" style="display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;"></div>
    <div class="mda">
      <button class="btn-ghost" onclick="closeModal('mFasAssign')">İptal</button>
      <button class="btn-primary" id="fasAssignBtn" onclick="doFasAssign()">Kaydet</button>
    </div>
  </div>
</div>

<div class="mo" id="mAssign">
  <div class="md">
    <h3>Öğretmen Ata</h3>
    <p id="assignTxt" style="font-size:13px;color:var(--mu);font-weight:600;margin-bottom:14px;"></p>
    <div class="fg"><label>Öğretmen</label><select id="assignSel"><option value="">— Öğretmen seçin —</option></select></div>
    <div class="mda">
      <button class="btn-ghost" onclick="closeModal('mAssign')">İptal</button>
      <button class="btn-primary" id="assignBtn" onclick="doAssign()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Watch Overlay -->
<div id="frmOverlay" style="display:none;position:fixed;inset:0;z-index:5000;background:var(--p);flex-direction:column;">
  <iframe id="fasikülFrame" src="" allowfullscreen style="flex:1;border:none;width:100%;height:100%;"></iframe>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

import{getFirestore,doc,getDoc,setDoc,deleteDoc,collection,getDocs,query,where,serverTimestamp,onSnapshot}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

window.switchTab=(id,el)=>{
  document.querySelectorAll('.tp').forEach(t=>t.classList.remove('on'));
  $(id).classList.add('on');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');

  if(addBtn) addBtn.style.display = id==='tKullanici' ? 'flex' : 'none';

  if(id==='tKullanici') renderKullanici();
  if(id==='tOgr') renderOgrSts();
  if(id==='tOgt') renderOgtSts();
  if(id==='tFas') renderFasList();
};

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='index.html';return;}
  CU=user;
  const snap=await getDoc(doc(db,'users',user.uid));
  if(!snap.exists()||snap.data().role!=='admin'){location.href='index.html';return;}
  CP=snap.data();
  $('sb-av').textContent=ini(CP.name);
  $('sb-name').textContent=CP.name;
  await renderGenel();

  // BroadcastChannel: öğrenci cevap verince anında güncelle
  const _bc=new BroadcastChannel('dd_stats_live');
  _bc.onmessage=({data})=>{
    // allStudents listesindeki ilgili öğrenciyi güncelle
    if(!window._admStudentStats) window._admStudentStats={};
    window._admStudentStats[data.uid]={correct:data.correct,wrong:data.wrong,total:data.total};
    // Tüm öğrenci toplamlarını yeniden hesapla
    let tQ=0,tC=0;
    (allUsers||[]).filter(u=>u.role==='student').forEach(u=>{
      const st=window._admStudentStats[u.id]||{};
      tQ+=(st.total||0); tC+=(st.correct||0);
    });
    const aP=tQ?Math.round(tC/tQ*100):0;
    const eQ=$('adm-total-q'),eA=$('adm-avg-pct'),eC=$('adm-total-correct');
    if(eQ)eQ.textContent=tQ.toLocaleString('tr');
    if(eA)eA.textContent='%'+aP;
    if(eC)eC.textContent=tC.toLocaleString('tr');
  };
});

/* ── Genel Bakış ── */
async function renderGenel(){
  const el=$('tGenel-inner');
  const [usersSnap,statsSnaps]=await Promise.all([
    getDocs(collection(db,'users')),
    getDocs(collection(db,'stats'))
  ]);
  const users=usersSnap.docs.map(d=>({id:d.id,...d.data()}));
  allUsers=users;
  const students=users.filter(u=>u.role==='student');
  const teachers=users.filter(u=>u.role==='teacher');
  const studentIds=new Set(students.map(s=>s.id));
  $('user-count-badge').textContent=users.filter(u=>u.role!=='admin').length;

  let totalQ=0,totalMin=0,totalCorrect=0;
  window._admStudentStats={};
  statsSnaps.forEach(ss=>{
    if(!studentIds.has(ss.id)) return;
    const data=ss.data();
    let sc=0,sw=0;
    FASIKUL.forEach(f=>{const fs=data[f.id]||{};sc+=fs.correct||0;sw+=fs.wrong||0;totalMin+=fs.minutes||0;});
    totalQ+=sc+sw; totalCorrect+=sc;
    window._admStudentStats[ss.id]={correct:sc,wrong:sw,total:sc+sw};
  });
  const avgPct=totalQ?Math.round(totalCorrect/totalQ*100):0;

  el.innerHTML=`
  <div class="stat-grid">
    <div class="stat-card accent">
      <div class="stat-icon"><span class="material-symbols-outlined">groups</span></div>
      <div class="stat-val">${students.length}</div>
      <div class="stat-label">Öğrenci</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><span class="material-symbols-outlined">supervisor_account</span></div>
      <div class="stat-val">${teachers.length}</div>
      <div class="stat-label">Öğretmen</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><span class="material-symbols-outlined">quiz</span></div>
      <div class="stat-val" id="adm-total-q">${totalQ.toLocaleString('tr')}</div>
      <div class="stat-label">Toplam Soru</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">star</span></div>
      <div class="stat-val" id="adm-avg-pct">%${avgPct}</div>
      <div class="stat-label">Ort. Başarı</div>
    </div>
  </div>

  <div class="summary-grid">
    <!-- Öğretmen dağılımı -->
    <div class="card">
      <div class="card-title"><span class="material-symbols-outlined">people</span>Öğretmen Dağılımı</div>
      ${teachers.length?teachers.map(t=>{
        const myStudents=students.filter(s=>s.teacherId===t.id);
        const pct=students.length?Math.round(myStudents.length/students.length*100):0;
        return`<div class="prog-row">
          <div class="prog-top">
            <span class="prog-name">${t.name} <span style="font-size:11px;color:var(--mu);font-weight:500;">(${myStudents.length} öğrenci)</span></span>
            <span class="prog-pct">%${pct}</span>
          </div>
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        </div>`;}).join(''):'<div style="color:var(--mu);font-size:13px;font-style:italic;">Öğretmen bulunamadı.</div>'}
    </div>

    <!-- Hızlı istatistikler -->
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="highlight-card purple">
        <span class="material-symbols-outlined">schedule</span>
        <div>
          <div style="font-family:'Manrope',sans-serif;font-size:28px;font-weight:900;" id="adm-total-min">${fmt(totalMin)}</div>
          <div style="font-size:11px;opacity:.8;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px;">Toplam Çalışma</div>
        </div>
      </div>
      <div class="highlight-card green">
        <span class="material-symbols-outlined">check_circle</span>
        <div>
          <div style="font-family:'Manrope',sans-serif;font-size:28px;font-weight:900;" id="adm-total-correct">${totalCorrect.toLocaleString('tr')}</div>
          <div style="font-size:11px;opacity:.8;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px;">Doğru Cevap</div>
        </div>
      </div>
      <div class="highlight-card orange">
        <span class="material-symbols-outlined">auto_stories</span>
        <div>
          <div style="font-family:'Manrope',sans-serif;font-size:28px;font-weight:900;">${FASIKUL.length}</div>
          <div style="font-size:11px;opacity:.8;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px;">Aktif Fasikül</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Son Öğrenciler -->
  <div class="table-wrap">
    <div class="table-head">
      <div class="table-head-title">Son Kayıt Öğrenciler</div>
      <button class="btn-ghost" onclick="switchTab('tKullanici',null)">Tümünü Gör</button>
    </div>
    <table>
      <thead><tr>
        <th>Öğrenci</th><th>Kullanıcı Adı</th><th>Öğretmen</th><th>Fasikül</th>

          </tr>`;}).join('')}
      </tbody>
    </table>
  </div>`;

  // ── Stats gerçek zamanlı güncelleme (sadece öğrenciler) ──
  if(window._statsUnsub) window._statsUnsub();
  window._statsUnsub = onSnapshot(collection(db,'stats'), snap=>{
    let tQ=0,tM=0,tC=0;
    snap.forEach(ss=>{
      if(!studentIds.has(ss.id)) return;
      const data=ss.data();
      FASIKUL.forEach(f=>{const fs=data[f.id]||{};tQ+=(fs.correct||0)+(fs.wrong||0);tM+=fs.minutes||0;tC+=fs.correct||0;});
    });
    const aP=tQ?Math.round(tC/tQ*100):0;
    const eQ=$('adm-total-q'),eA=$('adm-avg-pct'),eM=$('adm-total-min'),eC=$('adm-total-correct');
    if(eQ)eQ.textContent=tQ.toLocaleString('tr');
    if(eA)eA.textContent='%'+aP;
    if(eM)eM.textContent=fmt(tM);
    if(eC)eC.textContent=tC.toLocaleString('tr');
  });
}

/* ── Öğrenci İstatistikleri ── */
async function renderOgrSts(){
  const el=$('tOgr-inner');
  el.innerHTML='<div class="ld"><div class="sp"></div>Yükleniyor...</div>';
  const snap=await getDocs(query(collection(db,'users'),where('role','==','student')));
  if(snap.empty){el.innerHTML='<div class="es"><div class="ic">👨‍🎓</div><p>Öğrenci yok.</p></div>';return;}

  const rows=await Promise.all(snap.docs.map(async ud=>{
    const u=ud.data();
    const ss=await getDoc(doc(db,'stats',ud.id));
    const data=ss.exists()?ss.data():{};
    let tc=0,tw=0,tm=0;
    FASIKUL.forEach(f=>{const fs=data[f.id]||{};tc+=fs.correct||0;tw+=fs.wrong||0;tm+=fs.minutes||0;});
    return{uid:ud.id,...u,tc,tw,tm,pct:tc+tw?Math.round(tc/(tc+tw)*100):0};
  }));
  rows.sort((a,b)=>b.pct-a.pct);

  el.innerHTML=`<div class="table-wrap">
    <div class="table-head"><div class="table-head-title">Öğrenci Sıralaması</div></div>
    <table>
      <thead><tr><th>#</th><th>Öğrenci</th><th>Doğru</th><th>Yanlış</th><th>Süre</th><th>Başarı</th><th>Fasikül İzle</th></tr></thead>
      <tbody>
        ${rows.map((r,i)=>`<tr>
          <td style="font-weight:800;color:${i<3?'var(--amb)':'var(--mu)'};">${i+1}</td>
          <td><div style="display:flex;align-items:center;gap:10px;"><div class="uav student">${ini(r.name)}</div><div style="font-weight:700;">${r.name}</div></div></td>
          <td style="color:var(--g);font-weight:700;">${r.tc}</td>
          <td style="color:var(--r);font-weight:700;">${r.tw}</td>
          <td style="color:var(--mu);">${fmt(r.tm)}</td>
          <td><div style="display:flex;align-items:center;gap:8px;">
            <div style="height:6px;width:80px;background:var(--s-high);border-radius:99px;overflow:hidden;"><div style="height:100%;background:${r.pct>=70?'var(--g)':r.pct>=40?'var(--p)':'var(--r)'};width:${r.pct}%;"></div></div>
            <span style="font-weight:800;font-size:13px;color:${r.pct>=70?'var(--g)':r.pct>=40?'var(--p)':'var(--r)'};">%${r.pct}</span>
          </div></td>
          <td><div style="display:flex;gap:4px;flex-wrap:wrap;">${FASIKUL.map(f=>`<button onclick="openLiveWatch('${r.uid}','${f.f}','${f.t}')" style="padding:3px 8px;border-radius:99px;border:1.5px solid #f59e0b;background:#fffbeb;color:#92400e;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap;" onmouseover="this.style.background='#f59e0b';this.style.color='#fff'" onmouseout="this.style.background='#fffbeb';this.style.color='#92400e'">👁 ${f.n}</button>`).join('')}</div></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

/* ── Öğretmen İstatistikleri ── */
async function renderOgtSts(){
  const el=$('tOgt-inner');
  el.innerHTML='<div class="ld"><div class="sp"></div>Yükleniyor...</div>';
  const [tSnap,sSnap]=await Promise.all([
    getDocs(query(collection(db,'users'),where('role','==','teacher'))),
    getDocs(query(collection(db,'users'),where('role','==','student')))
  ]);
  if(tSnap.empty){el.innerHTML='<div class="es"><div class="ic">👨‍🏫</div><p>Öğretmen yok.</p></div>';return;}
  const students=sSnap.docs.map(d=>({id:d.id,...d.data()}));

  const cards=await Promise.all(tSnap.docs.map(async td=>{
    const t=td.data();
    const myStudents=students.filter(s=>s.teacherId===td.id);
    let tc=0,tw=0,tm=0;
    for(const s of myStudents){
      const ss=await getDoc(doc(db,'stats',s.id));
      if(ss.exists()) FASIKUL.forEach(f=>{const fs=ss.data()[f.id]||{};tc+=fs.correct||0;tw+=fs.wrong||0;tm+=fs.minutes||0;});
    }
    return`<div class="card" style="margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="uav teacher" style="width:48px;height:48px;font-size:18px;">${ini(t.name)}</div>
          <div>
            <div style="font-family:'Manrope',sans-serif;font-size:16px;font-weight:800;">${t.name}</div>
            <div style="font-size:12px;color:var(--mu);">@${t.username} · ${myStudents.length} öğrenci</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center;">
          <div><div style="font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;color:var(--g);">${tc}</div><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;">Doğru</div></div>
          <div><div style="font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;color:var(--r);">${tw}</div><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;">Yanlış</div></div>
          <div><div style="font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;color:var(--p);">${fmt(tm)}</div><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;">Süre</div></div>
        </div>
      </div>
      ${myStudents.length?`<div style="display:flex;flex-wrap:wrap;gap:8px;">${myStudents.map(s=>`<div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--s-low);border-radius:99px;font-size:12px;font-weight:600;"><div class="uav student" style="width:24px;height:24px;font-size:10px;">${ini(s.name)}</div>${s.name}</div>`).join('')}</div>`:'<div style="font-size:13px;color:var(--mu);font-style:italic;">Henüz öğrenci atanmadı.</div>'}
    </div>`;
  }));
  el.innerHTML=cards.join('');
}

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div style="width:40px;height:40px;border-radius:10px;background:var(--pb);display:flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-weight:900;font-size:16px;color:var(--p);">${f.n}</div>
        <span style="font-size:9px;font-weight:700;color:rgba(70,21,153,.5);text-transform:uppercase;letter-spacing:.1em;">Fasikül #${f.n.padStart(2,'0')}</span>
      </div>
      <div style="font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;color:var(--tx);margin-bottom:4px;line-height:1.3;">${f.t}</div>
      <div style="font-size:11px;color:var(--mu);margin-bottom:14px;">${f.s}</div>
      <button class="btn-ghost" style="width:100%;justify-content:center;" onclick="(()=>{sessionStorage.setItem('dd_uid','${CU?.uid||''}');sessionStorage.setItem('dd_role','admin');sessionStorage.setItem('dd_fid','${f.id}');openFrame('${f.f}','${f.t}')})()">
        <span class="material-symbols-outlined" style="font-size:14px;">play_circle</span>Aç
      </button>
    </div>`).join('')}
  </div>`;
}

/* ── User CRUD ── */
window.openAddUser=async()=>{
  $('nn').value='';$('nu').value='';$('np').value='';$('nr').value='student';toggleTA();
  const snap=await getDocs(query(collection(db,'users'),where('role','==','teacher')));
  const sel=$('nt');sel.innerHTML='<option value="">-- Öğretmen seç --</option>';
  snap.docs.forEach(d=>{const t=d.data();sel.innerHTML+=`<option value="${d.id}">${t.name}</option>`;});
  oModal('mAdd');
};
window.toggleTA=()=>{$('tag').style.display=$('nr').value==='student'?'block':'none';};

window.saveUser=async()=>{
  const name=$('nn').value.trim(),uname=$('nu').value.trim().toLowerCase(),pass=$('np').value.trim(),role=$('nr').value,tid=$('nt').value;
  if(!name||!uname||!pass){alert('Tüm alanları doldurun.');return;}
  const btn=$('sbtn');btn.disabled=true;btn.textContent='Kaydediliyor...';
  // Admin kimlik bilgilerini kaydet (yeni kullanıcı oluşturunca Firebase oturum değişiyor)
  const adminEmail=CU.email;
  const adminPass=CP.password;
  try{
    const cred=await createUserWithEmailAndPassword(auth,uname+'@dijital-defter.app',pass);
    const newUid=cred.user.uid;
    // Öğretmen atamasıyla birlikte kaydet
    await setDoc(doc(db,'users',newUid),{
      name,
      username:uname,
      password:pass,
      role,
      teacherId:role==='student'?(tid||null):null,
      createdAt:serverTimestamp()
    });
    // Admin olarak geri giriş yap
    await signInWithEmailAndPassword(auth,adminEmail,adminPass);
    closeModal('mAdd');
    await renderKullanici();
    alert('✅ '+name+' eklendi.\nKullanıcı: '+uname+'\nŞifre: '+pass+(role==='student'&&tid?' \nÖğretmen atandı.':''));
  }catch(e){
    // Hata durumunda admin tekrar giriş yapmayı dene
    try{await signInWithEmailAndPassword(auth,adminEmail,adminPass);}catch(_){}
    if(e.code==='auth/email-already-in-use')alert('Bu kullanıcı adı zaten kayıtlı. Farklı bir kullanıcı adı seçin.');
    else alert('Hata: '+e.message);
  }
  btn.disabled=false;btn.textContent='Kaydet';
};

window.resetActivity=async(uid,name)=>{
  if(!confirm(`"${name}" adlı öğrencinin yıllık aktivite verisi silinecek. Emin misiniz?`))return;
  try{
    const ref=doc(db,'stats',uid);
    const snap=await getDoc(ref);
    if(snap.exists()){const d={...snap.data()};delete d.daily;await setDoc(ref,d);}
    alert('Aktivite verisi sıfırlandı.');
  }catch(e){alert('Hata: '+e.message);}
};

window.delUser=async(uid,name)=>{
  if(!confirm(`"${name}" silinsin mi?`))return;
  await deleteDoc(doc(db,'users',uid));
  await deleteDoc(doc(db,'stats',uid)).catch(()=>{});
  await renderKullanici();
};

window.showCred=(u,p,name)=>{
  cpTxt=`Kullanıcı: ${u}\nŞifre: ${p}`;
  $('credbox').innerHTML=`<b>Ad:</b> ${name}<br><b>Kullanıcı:</b> ${u}<br><b>Şifre:</b> ${p}`;
  oModal('mCred');
};
window.doCopy=()=>navigator.clipboard.writeText(cpTxt).then(()=>alert('Kopyalandı!')).catch(()=>alert(cpTxt));

window.openFasAssign=async(uid,name)=>{
  fasAssignUID=uid;
  $('fasAssignTxt').textContent=`"${name}" için erişilecek fasikülleri seçin.`;
  const snap=await getDoc(doc(db,'users',uid));
  const allowed=snap.exists()&&snap.data().allowedFasikul?snap.data().allowedFasikul:null;
  $('fasCheckList').innerHTML=FASIKUL.map(f=>`
    <label class="fas-check-item">
      <input type="checkbox" id="fc_${f.id}" value="${f.id}" ${!allowed||allowed.includes(f.id)?'checked':''}>
      <span style="flex:1;font-weight:700;">${f.n}. ${f.t}</span>
      <span style="font-size:11px;color:var(--mu);">${f.s}</span>
    </label>`).join('');
  oModal('mFasAssign');
};
window.fasToggleAll=val=>FASIKUL.forEach(f=>{const cb=$('fc_'+f.id);if(cb)cb.checked=val;});
window.doFasAssign=async()=>{
  if(!fasAssignUID)return;
  const selected=FASIKUL.map(f=>$('fc_'+f.id)).filter(c=>c&&c.checked).map(c=>c.value);
  const btn=$('fasAssignBtn');btn.disabled=true;btn.textContent='Kaydediliyor...';
  try{
    await setDoc(doc(db,'users',fasAssignUID),{allowedFasikul:selected.length===FASIKUL.length?null:selected},{merge:true});
    closeModal('mFasAssign');await renderKullanici();
  }catch(e){alert('Hata: '+e.message);}
  btn.disabled=false;btn.textContent='Kaydet';fasAssignUID=null;
};

window.openAssign=async(uid,name,currentTid)=>{
  assignUID=uid;
  $('assignTxt').textContent=`"${name}" adlı öğrenciye öğretmen atanıyor.`;
  const snap=await getDocs(query(collection(db,'users'),where('role','==','teacher')));
  const sel=$('assignSel');
  sel.innerHTML='<option value="">— Kaldır —</option>';
  snap.docs.forEach(d=>{const t=d.data();sel.innerHTML+=`<option value="${d.id}"${d.id===currentTid?' selected':''}>${t.name} (@${t.username})</option>`;});
  oModal('mAssign');
};
window.doAssign=async()=>{
  if(!assignUID)return;
  const btn=$('assignBtn');btn.disabled=true;btn.textContent='Kaydediliyor...';
  try{
    await setDoc(doc(db,'users',assignUID),{teacherId:$('assignSel').value||null},{merge:true});
    closeModal('mAssign');await renderKullanici();
  }catch(e){alert('Hata: '+e.message);}
  btn.disabled=false;btn.textContent='Kaydet';assignUID=null;
};

window.askReset=(uid,name)=>{rUID=uid;$('rtxt').textContent=`"${name}" tüm istatistikleri silinecek.`;oModal('mReset');};
window.doReset=async()=>{
  if(!rUID)return;
  await deleteDoc(doc(db,'stats',rUID)).catch(()=>{});
  closeModal('mReset');rUID=null;
  await renderKullanici();
};

window.addEventListener('message',e=>{if(e.data==='closeFrame')closeFrame();});
</script>
