<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4a2d9c">
<title>BrnGz Akademi</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;text-transform:none;letter-spacing:normal;word-wrap:normal;white-space:nowrap;direction:ltr;}
:root{
  --p:#461599;--pd:#3a1180;--pl:#6c45c0;--pb:#eaddff;
  --o:#f4913a;--od:#e07020;--g:#16a34a;--r:#dc2626;
  --bg:#fef7ff;--surface:#fef7ff;--s-low:#f8f1fc;--s-cnt:#f2ebf7;--s-high:#ede6f1;--s-highest:#e7e0eb;--s-lowest:#ffffff;
  --card:#fff;--tx:#1d1a22;--mu:#494453;--br:#cbc3d5;
  --primary-fixed:#eaddff;--primary-fixed-dim:#d1bcff;
  --sec:#655687;--sec-cnt:#d8c6fe;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
.scr{display:none;min-height:100vh;}
.scr.on{display:flex;flex-direction:column;}

/* ── Stat Cards ── */
.scards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:28px;max-width:1280px;margin-left:auto;margin-right:auto;}
@media(max-width:700px){.scards{grid-template-columns:repeat(3,1fr);}}
.sc{background:var(--s-lowest);border-radius:12px;padding:16px 12px;text-align:center;box-shadow:0 8px 24px rgba(70,21,153,0.05);transition:background .25s;}
.sc:hover{background:var(--primary-fixed);}
.sc .v{font-family:'Manrope',sans-serif;font-size:22px;font-weight:800;line-height:1;margin-bottom:4px;}
.sc .l{font-size:9px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;}
.sc.p .v{color:var(--p);}.sc.g .v{color:#16a34a;}.sc.r .v{color:#dc2626;}.sc.o .v{color:#e07020;}

/* ── Section wrapper ── */
.sts-wrap{max-width:1024px;margin:0 auto;}
.sts-progress-bar{height:8px;border-radius:99px;background:var(--s-highest);overflow:hidden;margin-top:6px;}
.sts-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--pl));transition:width .5s ease;}

/* ── Login ── */
#sLogin{
  align-items:center;justify-content:center;
  background:#f8f7ff;
  position:relative;overflow:hidden;
}
#sLogin::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(92,61,181,.08) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;}
#sLogin::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(70,21,153,.05) 0%,transparent 70%);bottom:-150px;left:-150px;pointer-events:none;}
.l-ring1{position:absolute;bottom:-400px;left:50%;transform:translateX(-50%);width:800px;height:800px;border-radius:50%;border:1px solid rgba(70,21,153,.12);pointer-events:none;}
.l-ring2{position:absolute;bottom:-300px;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;border:1px solid rgba(70,21,153,.08);pointer-events:none;}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.l-wrap{display:flex;flex-direction:column;align-items:center;width:100%;max-width:360px;position:relative;z-index:1;animation:fu .5s ease both;}
.l-brand{text-align:center;margin-bottom:36px;}
.lico{width:72px;height:72px;background:linear-gradient(135deg,#5c3db5,#4a2d9c);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;box-shadow:0 8px 24px rgba(70,21,153,.28);transform:rotate(3deg);}
.l-brand h1{font-size:26px;font-weight:800;color:#1a162d;font-family:'Manrope',sans-serif;letter-spacing:-.02em;}
.l-brand p{font-size:13px;color:#47435e;margin-top:4px;font-weight:500;letter-spacing:.02em;}
.lbox{background:#fff;border-radius:32px;padding:40px 36px;width:100%;box-shadow:0 20px 50px rgba(92,61,181,.08);}
.fg{margin-bottom:20px;}
.fg label{display:block;font-size:11px;font-weight:700;color:#47435e;text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px;margin-left:4px;}
.fg .fi-wrap{position:relative;}
.fg .fi-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#78728d;font-size:18px;pointer-events:none;line-height:1;}
.fg input{width:100%;padding:14px 14px 14px 44px;border:none;border-radius:16px;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:#1a162d;background:#e2dbf7;outline:none;transition:box-shadow .2s,background .2s;}
.fg input:focus{box-shadow:0 0 0 2px rgba(70,21,153,.25);background:#ddd5f5;}
.fg .fi-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#78728d;padding:4px;line-height:1;transition:color .2s;}
.fg .fi-eye:hover{color:#5c3db5;}
.l-forgot{display:flex;justify-content:flex-end;margin-top:8px;}
.l-forgot a{font-size:12px;font-weight:700;color:#5c3db5;text-decoration:none;opacity:.85;transition:opacity .2s;}
.l-forgot a:hover{opacity:1;text-decoration:underline;text-underline-offset:3px;}
.btnL{width:100%;padding:15px;background:linear-gradient(135deg,#5c3db5,#4a2d9c);color:#fff;border:none;border-radius:99px;font-family:'Manrope',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 4px 16px rgba(70,21,153,.35);transition:all .2s;letter-spacing:.01em;}
.btnL:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(70,21,153,.45);}
.btnL:active{transform:scale(.98);}
.btnL:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none;}
.lerr{background:#fef2f2;border:1.5px solid #fca5a5;color:var(--r);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;margin-top:14px;display:none;}
.l-footer{margin-top:28px;text-align:center;font-size:13px;color:#47435e;}
.l-footer a{color:#5c3db5;font-weight:700;margin-left:4px;text-decoration:none;}
.l-footer a:hover{text-decoration:underline;text-underline-offset:3px;}

/* ── Header ── */
.hdr{background:var(--surface);padding:0;height:56px;display:flex;align-items:center;flex-shrink:0;border-bottom:1px solid rgba(203,195,213,.28);position:sticky;top:0;z-index:200;}
.hdr-inner{width:100%;max-width:1280px;margin:0 auto;padding:0 28px;display:flex;align-items:center;gap:12px;}
.hdr .logo{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;flex:1;color:var(--p);white-space:nowrap;}
.hdr .logo span{color:var(--o);}
.hu{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;}
.hav{width:34px;height:34px;border-radius:50%;background:var(--sec-cnt);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--p);border:2px solid var(--pb);flex-shrink:0;}
.hrl{border-radius:99px;padding:3px 11px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;}
.hrl.student{background:var(--pb);color:var(--p);}
.btnO{background:transparent;border:1px solid rgba(203,195,213,.6);color:var(--p);border-radius:99px;padding:6px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em;white-space:nowrap;}
.btnO:hover{background:var(--pb);}

/* ── Tab Nav ── */
.tnav-wrap{background:var(--surface);border-bottom:1px solid rgba(203,195,213,.35);flex-shrink:0;overflow-x:auto;}
.tnav-wrap::-webkit-scrollbar{display:none;}
.tnav{width:100%;padding:0 28px;display:flex;gap:24px;justify-content:center;}
.tb{padding:13px 0;border:none;background:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;letter-spacing:.01em;}
.tb:hover{color:var(--p);}
.tb.on{color:var(--p);border-bottom-color:var(--p);}

/* ── Content Area ── */
.ca{flex:1;overflow-y:auto;padding:36px 28px;background:var(--s-low);}
.tp{display:none;}.tp.on{display:block;}
.stit{font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);margin-bottom:16px;}

/* ── Fasikül Grid ── */
.fgrid{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-bottom:32px;max-width:1280px;margin-left:auto;margin-right:auto;}
@media(max-width:600px){.fgrid{gap:12px;}}
.fc{background:var(--s-lowest);border-radius:14px;padding:22px;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s;box-shadow:0 4px 16px rgba(70,21,153,.05);cursor:pointer;width:260px;flex-shrink:0;}
@media(max-width:600px){.fc{width:calc(50% - 6px);}}
.fc:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(70,21,153,.12);}
.fc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.fnum{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;font-family:'Manrope',sans-serif;flex-shrink:0;}
.fnum.purple{background:rgba(216,198,254,.35);color:var(--p);}
.fnum.orange{background:#fef3e8;color:var(--od);}
.fnum.green{background:#f0fdf4;color:#16a34a;}
.fnum.blue{background:#eff6ff;color:#2563eb;}
.fnum.teal{background:#ecfeff;color:#0891b2;}
.fnum.rose{background:#fff1f2;color:#e11d48;}
.fnum.amber{background:#fffbeb;color:#d97706;}
.fc-badge{padding:3px 10px;border-radius:99px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
.fc-badge.started{background:#d1fae5;color:#065f46;}
.fc-badge.new{background:var(--s-high);color:var(--mu);}
.fc-seq{font-size:10px;font-weight:700;color:rgba(70,21,153,.5);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.ftit{font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;line-height:1.35;color:var(--tx);margin-bottom:12px;overflow-wrap:break-word;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.fsub{font-size:12px;color:var(--mu);font-weight:500;}
.fc-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:4px;}
.fc-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--mu);}
.fc-footer{margin-top:18px;}
.fc-progress-track{width:100%;height:8px;background:var(--s-high);border-radius:99px;overflow:hidden;margin-bottom:12px;}
.fc-progress-fill{height:100%;border-radius:99px;background:var(--p);transition:width .5s ease;}
.fc-progress-fill.partial{background:linear-gradient(90deg,var(--p),var(--pl));}
.fc-progress-fill.none{background:var(--s-highest);width:100%!important;}
.fc-btn{width:100%;padding:11px;border-radius:10px;border:1px solid rgba(203,195,213,.4);background:transparent;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
.fc-btn:hover{background:var(--p);color:#fff;border-color:var(--p);}

/* ── Modals ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.mo.on{display:flex;}
.md{background:#fff;border-radius:24px;padding:32px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.2);animation:fu .25s ease both;max-height:90vh;overflow-y:auto;}
.md h3{font-family:'Manrope',sans-serif;font-size:18px;font-weight:700;color:var(--p);margin-bottom:20px;}
.mda{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.btn{border:none;border-radius:8px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn:hover{opacity:.85;}
.btn.pr{background:var(--p);color:#fff;}.btn.gh{background:var(--pb);color:var(--p);}
.ld{text-align:center;padding:48px;color:var(--mu);font-weight:600;}
.sp{width:32px;height:32px;border:3px solid var(--s-high);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.es{text-align:center;padding:48px 24px;color:var(--mu);}
.es .ic{font-size:40px;margin-bottom:12px;}
.es p{font-size:14px;font-weight:500;}

/* ── Page header ── */
.pg-hdr{max-width:1280px;margin:0 auto 28px;padding:0;text-align:center;}
.pg-title{font-family:'Manrope',sans-serif;font-size:28px;font-weight:800;color:var(--tx);letter-spacing:-.5px;margin-bottom:6px;}
.pg-sub{font-size:14px;color:var(--mu);font-weight:500;}

/* ── Fasikül overlay ── */
#frmOverlay{display:none;position:fixed;inset:0;z-index:5000;background:var(--p);flex-direction:column;overscroll-behavior:none;}
#frmOverlay.on{display:flex;}
#fasikülFrame{flex:1;border:none;width:100%;height:100%;overscroll-behavior:none;}
@media(max-width:600px){.ca{padding:16px;}.lbox{padding:32px 24px;}.fgrid{grid-template-columns:1fr 1fr;}.hdr-inner{padding:0 16px;}.tnav{padding:0;}}

/* ══ Student App — Sidebar Layout ══ */
#sApp.on{height:100vh;overflow:hidden;flex-direction:row;}
.app-sidebar{width:256px;flex-shrink:0;height:100vh;position:sticky;top:0;background:var(--s-low);display:flex;flex-direction:column;padding:28px 16px 0;border-right:1px solid rgba(203,195,213,.2);overflow-y:auto;}
.app-sidebar::-webkit-scrollbar{width:4px;}
.app-sidebar::-webkit-scrollbar-thumb{background:var(--s-highest);border-radius:99px;}
.app-brand{padding:0 12px;margin-bottom:32px;}
.app-brand h1{font-family:'Manrope',sans-serif;font-size:18px;font-weight:900;color:var(--p);letter-spacing:-.02em;}
.app-brand p{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.15em;margin-top:2px;}
.app-profile{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:16px;margin-bottom:24px;box-shadow:0 2px 8px rgba(70,21,153,.05);}
.app-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#6c45c0,#461599);display:flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;}
.app-info h3{font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;color:var(--tx);line-height:1.2;}
.app-info p{font-size:10px;color:var(--mu);font-weight:600;margin-top:2px;}
.app-role{display:inline-block;padding:2px 8px;background:var(--pb);color:var(--p);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;border-radius:99px;margin-top:3px;}
.app-nav{display:flex;flex-direction:column;gap:4px;flex:1;}
.app-sec-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:var(--mu);padding:8px 12px 4px;margin-top:8px;}
.app-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:none;background:none;color:var(--mu);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;text-align:left;}
.app-nav-item:hover{background:var(--s-cnt);color:var(--tx);}
.app-nav-item.active{background:var(--pb);color:var(--p);}
.app-nav-item .material-symbols-outlined{font-size:18px;}
.app-footer{margin-top:auto;padding:16px 0;border-top:1px solid rgba(203,195,213,.3);flex-shrink:0;}
.app-logout{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:none;background:none;color:var(--mu);font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .15s;}
.app-logout:hover{background:#fef2f2;color:var(--r);}
.app-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;height:100vh;}
.app-topbar{position:sticky;top:0;z-index:50;background:rgba(254,247,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(203,195,213,.2);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.app-topbar-left{display:flex;align-items:center;gap:12px;}
.app-topbar-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;color:var(--tx);}
.app-topbar-sub{font-size:12px;color:var(--mu);font-weight:500;}
.app-content{padding:20px 24px;flex:1;overflow-y:auto;}
.app-tp{display:none;}.app-tp.on{display:block;}
.app-stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
.app-stat-card{background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 4px 16px rgba(70,21,153,.06);transition:all .2s;cursor:default;}
.app-stat-card:hover{background:var(--pb);transform:translateY(-2px);}
.app-stat-icon{width:36px;height:36px;border-radius:10px;background:rgba(216,198,254,.25);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.app-stat-icon .material-symbols-outlined{font-size:22px;color:var(--p);}
.app-stat-val{font-family:'Manrope',sans-serif;font-size:26px;font-weight:900;color:var(--tx);line-height:1;margin-bottom:4px;}
.app-stat-label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;}
.app-perf-grid{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-top:16px;}
.app-card{background:#fff;border-radius:20px;padding:20px 24px;box-shadow:0 4px 16px rgba(70,21,153,.06);overflow-y:auto;max-height:44vh;}
.app-card-title{font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;color:var(--tx);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.app-card-title .material-symbols-outlined{font-size:18px;color:var(--p);}
.app-sub-row{margin-bottom:18px;}
.app-sub-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.app-sub-name{font-size:13px;font-weight:700;color:var(--tx);}
.app-sub-pct{font-size:13px;font-weight:800;color:var(--p);}
.app-prog-track{height:8px;background:var(--s-high);border-radius:99px;overflow:hidden;}
.app-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--pl));transition:width .7s;}
.app-fas-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.app-fas-item{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--s-low);border-radius:14px;cursor:pointer;transition:all .15s;}
.app-fas-item:hover{background:var(--s-cnt);}
.app-fas-icon{width:38px;height:38px;border-radius:10px;background:var(--pb);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.app-fas-icon .material-symbols-outlined{font-size:18px;color:var(--p);}
.app-pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;}
.app-pill.done{background:#d1fae5;color:#065f46;}
.app-pill.locked{background:var(--s-high);color:var(--mu);}
/* hamburger */
.app-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;}
.app-hamburger span{display:block;width:22px;height:2px;background:var(--p);border-radius:99px;transition:all .25s;}
.app-sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:199;}
.app-sb-overlay.on{display:block;}
@media(max-width:900px){
  .app-sidebar{position:fixed;left:-280px;top:0;z-index:200;width:280px;transition:left .28s cubic-bezier(.4,0,.2,1);}
  .app-sidebar.open{left:0;box-shadow:4px 0 32px rgba(70,21,153,.18);}
  .app-hamburger{display:flex;}
  .app-main{width:100%;}
  .app-stat-grid{grid-template-columns:1fr 1fr 1fr;}
  .app-perf-grid{grid-template-columns:1fr;}
  .app-content{padding:16px 12px;}
  .app-card{max-height:none;}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="sLoading" style="position:fixed;inset:0;background:linear-gradient(135deg,#2d1b69,#4a2f99,#6B4FBB);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="text-align:center;color:#fff;">
    <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;"></div>

window.addEventListener('message',async e=>{
  if(e.data==='closeFrame'){closeFrame();return;}
  if(e.data==='openHome'){closeFrame();return;}
  if(e.data&&e.data.type==='statsLive'){
    const t=$('hs-total'),c=$('hs-correct'),w=$('hs-wrong');
    if(t) t.textContent=e.data.total;
    if(c) c.textContent=e.data.correct;
    if(w) w.textContent=e.data.wrong;
    // Diğer sekmelere (öğretmen, admin) anında bildir
    if(CU) window._statsBc&&window._statsBc.postMessage({uid:e.data.uid||CU.uid,fid:e.data.fid,correct:e.data.correct,wrong:e.data.wrong});
    return;
  }
  if(e.data&&e.data.type==='statsUpdate'&&CU&&e.data.uid===CU.uid){
    try{
      const ref=doc(db,'stats',CU.uid);
      const snap=await getDoc(ref);
      const existing=snap.exists()?snap.data():{};
      const prev=existing[e.data.fid]||{};
      await setDoc(ref,{...existing,[e.data.fid]:{
        correct:e.data.correct,
        wrong:e.data.wrong,
        shown:e.data.shown||0,
        minutes:e.data.minutes!=null?e.data.minutes:(prev.minutes||0),
        solutionViews:e.data.solutionViews||0,
        sections:e.data.sections||{},
        peekSections:e.data.peekSections||{}
      }});
    }catch(_){}
    return;
  }
  if(e.data&&e.data.type==='activity'&&CU){
    const today=new Date().toISOString().slice(0,10);
    const snap=await getDoc(doc(db,'stats',CU.uid));
    const existing=snap.exists()?snap.data():{};
    const prev=(existing.daily||{})[today]||{minutes:0,questions:0,pages:0};
    const newDay={
      minutes:Math.min(Math.max(prev.minutes||0,e.data.minutes||0),480),
      questions:Math.max(prev.questions||0,e.data.questions||0),
      pages:Math.max(prev.pages||0,e.data.pages||0),
    };
    await setDoc(doc(db,'stats',CU.uid),{daily:{...(existing.daily||{}),[today]:newDay}},{merge:true});
  }
});

/* ── Heatmap builder ── */
function buildStudentHeatmap(daily){
  const hC=['#e7e0eb','#d0bef5','#a78bfa','#7c3aed','#461599'];
  const now=new Date(),startDate=new Date(now.getFullYear(),now.getMonth()-8,1);
  const dates=[];const cur=new Date(startDate);
  while(cur<=now){dates.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  let maxVal=0;
  dates.forEach(dt=>{const v=daily[dt]||{};const s=(v.minutes||0)+(v.questions||0)*2+(v.pages||0);if(s>maxVal)maxVal=s;});
  function col(dt){const v=daily[dt]||{};const s=(v.minutes||0)+(v.questions||0)*2+(v.pages||0);if(!s)return hC[0];const r=s/maxVal;if(r<.2)return hC[1];if(r<.4)return hC[2];if(r<.7)return hC[3];return hC[4];}
  let totalMin=0,totalQ=0,activeDays=0,cells='';
  dates.forEach(dt=>{const v=daily[dt]||{};const m=v.minutes||0,q=v.questions||0,p=v.pages||0;totalMin+=m;totalQ+=q;if(m||q||p)activeDays++;cells+=`<div title="${dt}: ${m}dk, ${q} soru" style="height:14px;border-radius:3px;background:${col(dt)};"></div>`;});
  const mN=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  const seen=new Set();const lbls=[];dates.forEach(dt=>{const m=parseInt(dt.slice(5,7))-1;if(!seen.has(m)){seen.add(m);lbls.push(mN[m]);}});
  const monthLabels=`<div style="display:flex;justify-content:space-between;padding:0 2px;margin-bottom:5px;">${lbls.map(m=>`<span style="font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;">${m}</span>`).join('')}</div>`;
  return{cells,monthLabels,totalMin,totalQ,activeDays,hC};
}

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(203,195,213,.2);">
        <div style="text-align:center;"><div style="font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;color:#16a34a;">${tc}</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);margin-top:4px;">Doğru</div></div>
        <div style="text-align:center;"><div style="font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;color:#dc2626;">${tw}</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);margin-top:4px;">Yanlış</div></div>
        <div style="text-align:center;"><div style="font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;color:var(--p);">%${pct}</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);margin-top:4px;">Başarı</div></div>
      </div>
    </div>
    <div class="app-card" style="display:flex;flex-direction:column;">
      <div class="app-card-title"><span class="material-symbols-outlined">auto_stories</span>Fasikül Durumu</div>
      <div class="app-fas-list" style="flex:1;overflow-y:auto;">
        ${fasStats.map(f=>`
        <div class="app-fas-item" onclick="openFrame('${f.f}','${f.t}',{uid:'${CU.uid}',name:'${CP.name}',role:'student',fid:'${f.id}',tid:'${CP.teacherId||''}'})">
          <div class="app-fas-icon"><span class="material-symbols-outlined">menu_book</span></div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;color:var(--tx);line-height:1.3;">${f.t}</div>
            <div style="font-size:11px;color:var(--mu);margin-top:2px;">${f.s}${f.total?' · '+f.c+'/'+f.total+' ✓':''}${f.sv?' · 👁 '+f.sv:''}</div>
          </div>
          <span class="app-pill ${f.started?'done':'locked'}">${f.started?'%'+f.pct:'Yeni'}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

async function renderAyarlar(){
  const el=$('tAyarlar');
  const snap=await getDoc(doc(db,'stats',CU.uid));
  const data=snap.exists()?snap.data():{};
  let tc=0,tw=0,tm=0;
  FASIKUL.forEach(f=>{const fs=data[f.id]||{};tc+=fs.correct||0;tw+=fs.wrong||0;tm+=fs.minutes||0;});
  const pct=tc+tw?Math.round(tc/(tc+tw)*100):0;
  el.innerHTML=`
  <div style="max-width:600px;margin:0 auto;">
    <div style="background:#fff;border-radius:20px;padding:24px;box-shadow:0 4px 16px rgba(70,21,153,.06);margin-bottom:16px;">
      <div style="font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;color:var(--tx);margin-bottom:16px;">👤 Profil</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6c45c0,#461599);display:flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-weight:900;font-size:22px;color:#fff;">${ini(CP.name)}</div>
        <div>
          <div style="font-family:'Manrope',sans-serif;font-size:16px;font-weight:800;color:var(--tx);">${CP.name}</div>
          <div style="font-size:12px;color:var(--mu);margin-top:2px;">@${CP.username||'öğrenci'}</div>
          <span style="display:inline-block;padding:2px 8px;background:var(--pb);color:var(--p);font-size:9px;font-weight:800;text-transform:uppercase;border-radius:99px;margin-top:4px;">Öğrenci</span>
        </div>
      </div>
    </div>
    <div style="background:#fff;border-radius:20px;padding:24px;box-shadow:0 4px 16px rgba(70,21,153,.06);margin-bottom:16px;">
      <div style="font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;color:var(--tx);margin-bottom:16px;">📊 Genel İstatistik</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
        ${[{l:'Toplam Soru',v:tc+tw,c:'var(--p)'},{l:'Doğru',v:tc,c:'#16a34a'},{l:'Yanlış',v:tw,c:'#dc2626'},{l:'Başarı',v:'%'+pct,c:'var(--p)'},{l:'Süre',v:fmt(tm),c:'var(--p)'},{l:'Aktif Fasikül',v:FASIKUL.filter(f=>{const d=data[f.id]||{};return d.correct||d.wrong||d.minutes;}).length,c:'var(--p)'}]
          .map(s=>`<div style="background:var(--s-low);border-radius:12px;padding:14px;text-align:center;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);letter-spacing:.08em;margin-bottom:6px;">${s.l}</div>
            <div style="font-family:'Manrope',sans-serif;font-size:22px;font-weight:900;color:${s.c};">${s.v}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

async function renderFas(){
  const g=$('fgrid');g.innerHTML='<div class="ld"><div class="sp"></div>Yükleniyor...</div>';
  const [statsSnap,userSnap]=await Promise.all([getDoc(doc(db,'stats',CU.uid)),getDoc(doc(db,'users',CU.uid))]);
  const us=statsSnap.exists()?statsSnap.data():{};
  const allowed=userSnap.exists()&&userSnap.data().allowedFasikul?userSnap.data().allowedFasikul:null;
  const visibleFas=allowed?FASIKUL.filter(f=>allowed.includes(f.id)):FASIKUL;
  g.innerHTML='';
  if(visibleFas.length===0){g.innerHTML='<div class="es" style="grid-column:1/-1"><div class="ic">📚</div><p>Erişebileceğiniz fasikül bulunmuyor.</p></div>';return;}
  let lastFid=null;
  try{lastFid=localStorage.getItem('dd_last_'+CU.uid);}catch(e){}
  // Son açılan fasikülü listenin başına taşı
  const sortedFas=[...visibleFas].sort((a,b)=>{
    if(a.id===lastFid)return -1;
    if(b.id===lastFid)return 1;
    return 0;
  });
  sortedFas.forEach(f=>{
    const fs=us[f.id]||{},c=fs.correct||0,w=fs.wrong||0,m=fs.minutes||0;
    const started=c||w||m,total=c+w,pct=total?Math.round(c/total*100):0;
    const numPad=f.n.toString().padStart(2,'0');
    const isLast=f.id===lastFid&&started;
    const card=document.createElement('div');
    card.className='fc';
    if(isLast)card.style.cssText='outline:2px solid var(--p);outline-offset:2px;';
    card.innerHTML=
      '<div class="fc-top">'+
        '<div class="fnum '+f.c+'">'+f.n+'</div>'+
        '<span class="fc-badge '+(started?'started':'new')+'">'+(isLast?'Son Açılan':started?'Başlandı':'Yeni')+'</span>'+
      '</div>'+
      '<div class="fc-seq">Fasikül #'+numPad+'</div>'+
      '<div class="ftit">'+f.t+'</div>'+
      '<div class="fsub">'+f.s+'</div>'+
      '<div class="fc-meta">'+
        (c||w?'<div class="fc-meta-item">✓ '+c+' Doğru · '+w+' Yanlış</div>':'')+
        (m?'<div class="fc-meta-item">⏱ '+fmt(m)+'</div>':'')+
        (!started?'<div class="fc-meta-item" style="color:var(--mu);font-style:italic;">Henüz başlanmadı</div>':'')+
      '</div>'+
      '<div class="fc-footer">'+
        '<div class="fc-progress-track">'+
          '<div class="fc-progress-fill'+(started?(total>0?' partial':''):' none')+'" style="width:'+(started?(total>0?pct:8):100)+'%"></div>'+
        '</div>'+
        '<button class="fc-btn">▶ '+(isLast?'Kaldığımdan Devam Et':started?'Devam Et':'Başla')+'</button>'+
      '</div>';
    card.onclick=()=>openFrame(f.f,f.t,{uid:CU.uid,name:CP.name,role:'student',fid:f.id,tid:CP.teacherId||''});
    g.appendChild(card);
  });
}
