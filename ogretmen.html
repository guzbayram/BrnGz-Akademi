<!DOCTYPE html>
<html lang="tr" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrnGz Akademi — Öğretmen Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
:root{
  --p:#461599;--pd:#3a1180;--pl:#6c45c0;--pb:#eaddff;--pb2:#d1bcff;
  --bg:#fef7ff;--s-low:#f8f1fc;--s-cnt:#f2ebf7;--s-high:#ede6f1;--s-highest:#e7e0eb;--s-lowest:#fff;
  --tx:#1d1a22;--mu:#494453;--br:#cbc3d5;
  --g:#16a34a;--r:#dc2626;--o:#e07020;--amb:#d97706;
  --shadow-p:rgba(70,21,153,.08);
  --shadow-lg:0 8px 24px rgba(70,21,153,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;overflow:hidden;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;}

/* ── Sidebar ── */
.sidebar{
  width:256px;flex-shrink:0;height:100vh;position:sticky;top:0;
  background:var(--s-low);
  display:flex;flex-direction:column;
  padding:28px 16px 0;gap:0;
  border-right:1px solid rgba(203,195,213,.2);
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar::-webkit-scrollbar-thumb{background:var(--s-highest);border-radius:99px;}
.sb-brand{padding:0 12px;margin-bottom:32px;}
.sb-brand h1{font-family:'Manrope',sans-serif;font-size:18px;font-weight:900;color:var(--p);letter-spacing:-.02em;}
.sb-brand p{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.15em;margin-top:2px;}

.sb-profile{display:flex;align-items:center;gap:12px;padding:12px;background:var(--s-lowest);border-radius:16px;margin-bottom:24px;box-shadow:0 2px 8px rgba(70,21,153,.05);}
.sb-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--pl),var(--p));display:flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-weight:800;font-size:16px;color:#fff;flex-shrink:0;}
.sb-info h3{font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;color:var(--tx);line-height:1.2;}
.sb-info p{font-size:10px;color:var(--mu);font-weight:600;margin-top:2px;}
.sb-role{display:inline-block;padding:2px 8px;background:#f0fdf4;color:var(--g);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;border-radius:99px;margin-top:3px;}

.sb-nav{display:flex;flex-direction:column;gap:4px;flex:1;}
.sb-section-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:var(--mu);padding:8px 12px 4px;margin-top:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:none;background:none;color:var(--mu);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;text-align:left;text-decoration:none;}
.nav-item:hover{background:var(--s-cnt);color:var(--tx);}
.nav-item.active{background:var(--pb);color:var(--p);}
.nav-item .material-symbols-outlined{font-size:18px;}
.nav-item .badge{margin-left:auto;background:var(--p);color:#fff;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:800;}

.sb-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(203,195,213,.3);}
.sb-logout{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:none;background:none;color:var(--mu);font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .15s;}
.sb-logout:hover{background:#fef2f2;color:var(--r);}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;height:100vh;}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(254,247,255,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(203,195,213,.2);
  padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;color:var(--tx);}
.topbar-sub{font-size:12px;color:var(--mu);font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--mu);transition:all .15s;}
.icon-btn:hover{background:var(--s-cnt);color:var(--p);}

/* ── Content ── */
.content{padding:20px 24px;flex:1;overflow-y:auto;display:flex;flex-direction:column;justify-content:center;}
.tp{display:none;}.tp.on{display:flex;flex-direction:column;height:100%;}
/* Öğrencilerim içeriği dikeyde ortala */
#tOgr-inner{justify-content:center;}

/* ── Section Header ── */
.sec-hdr{display:flex;align-items:flex-end;justify-content:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;text-align:center;}
.sec-title{font-family:'Manrope',sans-serif;font-size:24px;font-weight:900;color:var(--tx);letter-spacing:-.02em;}
.sec-sub{font-size:13px;color:var(--mu);font-weight:500;margin-top:4px;}
.sec-actions{display:flex;gap:8px;}

/* ── Buttons ── */
.btn-primary{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;border-radius:99px;padding:9px 20px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;box-shadow:0 4px 12px rgba(70,21,153,.25);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(70,21,153,.35);}
.btn-ghost{background:transparent;border:1.5px solid rgba(203,195,213,.6);color:var(--p);border-radius:99px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.btn-ghost:hover{background:var(--pb);border-color:var(--pb);}

/* ── Stat Cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.stat-card{background:var(--s-lowest);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow-lg);transition:all .2s;cursor:default;}
.stat-card:hover{background:var(--pb);transform:translateY(-2px);box-shadow:0 12px 32px rgba(70,21,153,.12);}
.stat-icon{width:36px;height:36px;border-radius:10px;background:rgba(216,198,254,.25);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-icon .material-symbols-outlined{font-size:22px;color:var(--p);}
.stat-val{font-family:'Manrope',sans-serif;font-size:26px;font-weight:900;color:var(--tx);line-height:1;margin-bottom:4px;}
.stat-label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;}
.stat-delta{font-size:11px;font-weight:700;color:var(--g);margin-top:6px;}

/* ── Student Scroll ── */
.student-row{display:flex;gap:24px;overflow-x:auto;padding:8px 0 16px;margin-bottom:16px;scrollbar-width:none;justify-content:center;flex-wrap:wrap;}
.student-row::-webkit-scrollbar{display:none;}
.student-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s;}
.student-chip .avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-weight:800;font-size:20px;border:3px solid transparent;transition:all .2s;background:var(--s-high);color:var(--p);}
.student-chip.active .avatar{border-color:var(--p);background:var(--pb);box-shadow:0 0 0 3px rgba(70,21,153,.1);}
.student-chip:hover .avatar{border-color:var(--pb2);}
.student-chip .name{font-size:11px;font-weight:700;color:var(--mu);transition:color .15s;}
.student-chip.active .name{color:var(--p);}
.student-chip .live-dot{width:10px;height:10px;border-radius:50%;background:var(--g);border:2px solid #fff;position:absolute;bottom:2px;right:2px;}
.student-chip .av-wrap{position:relative;}

/* ── Performance Section ── */
.perf-grid{display:grid;grid-template-columns:3fr 2fr;gap:16px;}
.card{background:var(--s-lowest);border-radius:20px;padding:20px 24px;box-shadow:var(--shadow-lg);overflow-y:auto;height:40vh;min-height:280px;}
.card-title{font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;color:var(--tx);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.card-title .material-symbols-outlined{font-size:18px;color:var(--p);}

/* Progress bars */
.subject-row{margin-bottom:18px;}
.subject-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.subject-name{font-size:13px;font-weight:700;color:var(--tx);}
.subject-pct{font-size:13px;font-weight:800;color:var(--p);}
.prog-track{height:8px;background:var(--s-high);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--pl));transition:width .7s cubic-bezier(.4,0,.2,1);}

/* ── Fasikül Status ── */
.fas-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.fas-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--s-low);border-radius:14px;transition:all .15s;}
.fas-item:hover{background:var(--s-cnt);}
.fas-item.active{border-left:3px solid var(--p);}
.fas-icon{width:40px;height:40px;border-radius:10px;background:var(--pb);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fas-icon .material-symbols-outlined{font-size:18px;color:var(--p);}
.fas-name{font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;color:var(--tx);line-height:1.3;}
.fas-sub{font-size:11px;color:var(--mu);font-weight:500;margin-top:2px;}
.fas-status{margin-left:auto;flex-shrink:0;}
.pill{display:inline-block;padding:4px 10px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
.pill.done{background:#d1fae5;color:#065f46;}
.pill.active{background:var(--pb);color:var(--p);}
.pill.locked{background:var(--s-high);color:var(--mu);}
.watch-btn{padding:5px 12px;border-radius:99px;border:1.5px solid #f59e0b;background:#fffbeb;color:#92400e;font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;margin-left:8px;}
.watch-btn:hover{background:#f59e0b;color:#fff;border-color:#f59e0b;}

/* ── Student List (full) ── */
.student-table{width:100%;border-collapse:collapse;}
.student-table th{background:var(--s-low);color:var(--p);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:12px 16px;text-align:left;}
.student-table td{padding:14px 16px;font-size:13px;border-top:1px solid rgba(203,195,213,.15);}
.student-table tr:hover td{background:var(--s-low);}
.student-table .av{width:36px;height:36px;border-radius:50%;background:var(--pb);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--p);}

/* ── Insight Card ── */
.insight-card{background:linear-gradient(135deg,rgba(70,21,153,.05),rgba(108,69,192,.08));border:1px solid rgba(70,21,153,.08);border-radius:16px;padding:18px 20px;display:flex;align-items:flex-start;gap:14px;margin-top:20px;}
.insight-icon{width:40px;height:40px;border-radius:10px;background:var(--pb);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.insight-text{font-size:13px;color:var(--mu);line-height:1.6;font-style:italic;}
.insight-text strong{color:var(--tx);font-style:normal;}

/* ── Loading / Empty ── */
.ld{text-align:center;padding:60px;color:var(--mu);}
.sp{width:32px;height:32px;border:3px solid var(--s-high);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.es{text-align:center;padding:60px 24px;color:var(--mu);}
.es .ic{font-size:40px;margin-bottom:12px;}

/* ── Heatmap ── */
.heatmap-card{background:var(--s-low);border-radius:20px;padding:24px;margin-bottom:20px;}
.heatmap-grid{display:grid;gap:4px;}
.heat-cell{height:14px;border-radius:3px;cursor:default;}

/* ── Hamburger ── */
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;transition:background .15s;}
.hamburger:hover{background:var(--s-cnt);}
.hamburger span{display:block;width:22px;height:2px;background:var(--p);border-radius:99px;transition:all .25s;}

/* Sidebar overlay on mobile */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:199;}
.sb-overlay.on{display:block;}

/* ── Mobile ── */
@media(max-width:900px){
  .sidebar{
    position:fixed;left:-280px;top:0;z-index:200;
    width:280px;height:100vh;
    transition:left .28s cubic-bezier(.4,0,.2,1);
    box-shadow:none;
  }
  .sidebar.open{left:0;box-shadow:4px 0 32px rgba(70,21,153,.18);}
  .hamburger{display:flex;}
  .main{width:100%;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .perf-grid{grid-template-columns:1fr;}
  .content{padding:16px 12px;}
  .card{height:auto;min-height:0;max-height:60vh;}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.tp.on > *{animation:fadeUp .3s ease both;}
</style>
</head>
<body>

<!-- Mobile sidebar overlay -->
<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <h1>BrnGz Akademi</h1>
    <p>Öğretmen Paneli</p>
  </div>

  <div class="sb-profile" id="sb-profile">
    <div class="sb-av" id="sb-av">?</div>
    <div class="sb-info">
      <h3 id="sb-name">Yükleniyor...</h3>
      <p id="sb-email">—</p>
      <span class="sb-role">Öğretmen</span>
    </div>
  </div>

  <nav class="sb-nav">
    <div class="sb-section-label">Ana Menü</div>
    <button class="nav-item active" onclick="switchTab('tOgr',this)">
      <span class="material-symbols-outlined">home</span>
      Anasayfa
      <span class="badge" id="student-count-badge">—</span>
    </button>
    <button class="nav-item" onclick="switchTab('tFas',this)">
      <span class="material-symbols-outlined">auto_stories</span>
      Fasiküller
    </button>
    <button class="nav-item" onclick="switchTab('tAyarlar',this)">
      <span class="material-symbols-outlined">settings</span>
      Ayarlar
    </button>

    <!-- Öğrenci listesi — Ayarlar'ın hemen altında -->
    <div id="sb-students" style="margin-top:4px;padding-top:8px;border-top:1px solid rgba(203,195,213,.2);display:none;flex-direction:column;gap:2px;">
      <div class="sb-section-label" style="margin-top:0;padding-top:2px;">Öğrenciler</div>
    </div>
  </nav>

  <div class="sb-footer" style="flex-shrink:0;margin-top:auto;padding:16px 0;">
    <button class="sb-logout" id="logout-btn">
      <span class="material-symbols-outlined">logout</span>
      Çıkış Yap
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Menü">
        <span></span><span></span><span></span>
      </button>
      <div>
        <div class="topbar-title" id="topbar-title">Anasayfa</div>
        <div class="topbar-sub" id="topbar-sub">Öğrenci performanslarını izle</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" title="Bildirimler">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <button id="topbar-logout-btn" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;border:1.5px solid rgba(203,195,213,.6);background:none;color:var(--mu);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='#fef2f2';this.style.color='var(--r)';this.style.borderColor='#fecaca'" onmouseout="this.style.background='none';this.style.color='var(--mu)';this.style.borderColor='rgba(203,195,213,.6)'">
        <span class="material-symbols-outlined" style="font-size:16px;">logout</span>
        Çıkış Yap
      </button>
    </div>
  </header>

  <!-- Content -->
  <div class="content">

    <!-- Öğrencilerim Tab -->
    <div class="tp on" id="tOgr" style="justify-content:center;">
      <div id="tOgr-inner" style="display:flex;flex-direction:column;width:100%;">
        <div class="ld"><div class="sp"></div>Yükleniyor...</div>
      </div>
    </div>

    <!-- Fasiküller Tab -->
    <div class="tp" id="tFas" style="overflow-y:auto;justify-content:center;align-items:center;flex-direction:column;">
      <div id="fas-grid" class="ld" style="justify-content:center;"><div class="sp"></div>Yükleniyor...</div>
    </div>

    <!-- Ayarlar Tab -->
    <div class="tp" id="tAyarlar" style="overflow-y:auto;align-items:center;">
      <div style="width:100%;max-width:calc(4*230px + 3*16px);margin:0 auto;">

        <!-- Fasikül Atamaları -->
        <div id="ayarlar-assignment" style="display:none;background:var(--s-lowest);border-radius:16px;padding:20px 24px;box-shadow:var(--shadow-lg);margin-bottom:16px;"></div>

        <!-- Fasikül istatistikleri -->
        <div id="ayarlar-fas-list" style="display:flex;flex-direction:column;gap:12px;"></div>
      </div>
    </div>

  </div>
</div>


<!-- Fasikül Karne Modal -->
<div id="karneModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:4000;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:24px;padding:28px;max-width:580px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 24px 64px rgba(70,21,153,.2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div>
        <div id="km-title" style="font-family:'Manrope',sans-serif;font-size:18px;font-weight:900;color:var(--p);"></div>
        <div id="km-sub" style="font-size:12px;color:var(--mu);margin-top:2px;"></div>
      </div>
      <button onclick="closeKarne()" style="background:var(--s-high);border:none;border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:18px;">✕</button>
    </div>
    <!-- Özet stat kutuları -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;" id="km-stats"></div>
    <!-- Section / konu bazlı tablo -->
    <div id="km-sections"></div>
    <!-- Butonlar -->
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button id="km-watch-btn" style="flex:1;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;border-radius:12px;padding:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
        👁 Canlı İzle
      </button>
      <button id="km-view-btn" style="flex:1;background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;border:none;border-radius:12px;padding:12px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
        📚 Geçmiş Çalışma
      </button>
    </div>
  </div>
</div>

<!-- Avatar Picker Modal -->
<div id="avPickerModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:6000;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:22px;padding:24px;width:100%;max-width:320px;box-shadow:0 20px 56px rgba(70,21,153,.22);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div style="font-family:'Manrope',sans-serif;font-size:16px;font-weight:900;color:var(--p);">🖼 Avatar Seç</div>
      <button onclick="closeAvPicker()" style="background:var(--s-high);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>
    <input type="hidden" id="avPickerUid">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
      <button onclick="saveAvatar(document.getElementById('avPickerUid').value,'male')"

const AV_COLS=['linear-gradient(135deg,#7c3aed,#a78bfa)','linear-gradient(135deg,#0ea5e9,#38bdf8)','linear-gradient(135deg,#10b981,#6ee7b7)','linear-gradient(135deg,#f59e0b,#fcd34d)','linear-gradient(135deg,#ef4444,#fca5a5)','linear-gradient(135deg,#ec4899,#f9a8d4)','linear-gradient(135deg,#14b8a6,#5eead4)','linear-gradient(135deg,#8b5cf6,#c4b5fd)'];
function getAvColor(uid){let h=0;for(const c of(uid||'x'))h=(h<<5)-h+c.charCodeAt(0);return AV_COLS[Math.abs(h)%AV_COLS.length];}
function avHTML(s,sz=28,fsz=11,clickable=false){

  }

/* ── Öğrenciler Tab ── */
async function renderOgr(){
  const el=$('tOgr-inner');
  el.innerHTML='<div class="ld"><div class="sp"></div>Yükleniyor...</div>';

  const snap=await getDocs(query(collection(db,'users'),where('role','==','student'),where('teacherId','==',CU.uid)));
  $('student-count-badge').textContent=snap.size;

  if(snap.empty){
    el.innerHTML='<div class="es"><div class="ic">👨‍🎓</div><p>Henüz atanmış öğrenciniz yok.</p></div>';
    $('sb-students').style.display='none';
    return;
  }

  const students=[];
  for(const ud of snap.docs){
    const u=ud.data();
    const ss=await getDoc(doc(db,'stats',ud.id));
    const stats=ss.exists()?ss.data():{};
    let tc=0,tw=0,tm=0;
    EFFECTIVE_FASIKUL.forEach(f=>{const fs=stats[f.id]||{};tc+=fs.correct||0;tw+=fs.wrong||0;tm+=fs.minutes||0;});
    students.push({uid:ud.id,...u,tc,tw,tm,pct:tc+tw?Math.round(tc/(tc+tw)*100):0,stats});
  }

  if(!activeStudentUid) activeStudentUid=students[0]?.uid;

  // ── Özet stat kartlar ──

function buildHeatmap(daily){
  const hC=['#e7e0eb','#d0bef5','#a78bfa','#7c3aed','#461599'];
  const now=new Date();
  const startDate=new Date(now.getFullYear(),now.getMonth()-8,1);
  const dates=[];const cur=new Date(startDate);
  while(cur<=now){dates.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  let maxVal=0;
  dates.forEach(dt=>{const v=daily[dt]||{};const s=(v.minutes||0)+(v.questions||0)*2+(v.pages||0);if(s>maxVal)maxVal=s;});
  function col(dt){const v=daily[dt]||{};const s=(v.minutes||0)+(v.questions||0)*2+(v.pages||0);if(!s)return hC[0];const r=s/maxVal;if(r<.2)return hC[1];if(r<.4)return hC[2];if(r<.7)return hC[3];return hC[4];}
  let totalMin=0,totalQ=0,activeDays=0,cells='';
  dates.forEach(dt=>{const v=daily[dt]||{};const m=v.minutes||0,q=v.questions||0,p=v.pages||0;totalMin+=m;totalQ+=q;if(m||q||p)activeDays++;cells+=`<div title="${dt}: ${m}dk, ${q} soru${p?' '+p+' sayfa':''}" style="height:14px;border-radius:3px;background:${col(dt)};cursor:default;"></div>`;});
  const mN=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  const seen=new Set();const lbls=[];dates.forEach(dt=>{const m=parseInt(dt.slice(5,7))-1;if(!seen.has(m)){seen.add(m);lbls.push(mN[m]);}});
  const monthLabels=`<div style="display:flex;justify-content:space-between;padding:0 2px;margin-bottom:5px;">${lbls.map(m=>`<span style="font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;">${m}</span>`).join('')}</div>`;
  return{cells,monthLabels,totalMin,totalQ,activeDays,hC};
}

function renderStudentDetail(s){
  const el=$('student-detail');
  if(!el) return;

  // Per-fasikul stats

    const fs=s.stats[f.id]||{};

    return{...f,c,w,m,total,pct:total?Math.round(c/total*100):0,started:!!(c||w||m)};
  });

  const subjects=['Matematik','Fizik'];
  const subjectStats=subjects.map(sub=>{
    const fs=fasStats.filter(f=>f.s.toLowerCase().includes(sub.toLowerCase()));
    const c=fs.reduce((a,x)=>a+x.c,0),w=fs.reduce((a,x)=>a+x.w,0);
    const total=c+w;
    return{name:sub,pct:total?Math.round(c/total*100):0};
  });

          <span style="font-size:10px;color:var(--mu);">Az</span>
          ${hm.hC.map(c=>`<div style="width:11px;height:11px;border-radius:3px;background:${c};"></div>`).join('')}
          <span style="font-size:10px;color:var(--mu);">Çok</span>
        </div>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <div style="min-width:460px;">
        ${hm.monthLabels}
        <div style="display:grid;grid-template-columns:repeat(30,1fr);gap:3px;">${hm.cells}</div>
      </div>
    </div>
    <div style="text-align:center;margin-top:10px;">
      <p style="font-size:12px;color:var(--mu);font-style:italic;">Yıllık <strong style="color:var(--tx);">${fmt(s.tm)}</strong> çalışıldı · <strong style="color:var(--tx);">${s.tc+s.tw}</strong> soru çözüldü · <strong style="color:var(--tx);">${hm.activeDays}</strong> aktif gün</p>
    </div>
  </div>

  <div class="perf-grid">
    <!-- Performans -->
    <div class="card" style="display:flex;flex-direction:column;">
      <div class="card-title" style="flex-shrink:0;">
        <span class="material-symbols-outlined">monitoring</span>
        <span>${s.name} — Performans</span>
      </div>
      ${subjectStats.map(sub=>`
      <div class="subject-row">
        <div class="subject-top">
          <span class="subject-name">${sub.name}</span>
          <span class="subject-pct">%${sub.pct}</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${sub.pct}%"></div></div>
      </div>`).join('')}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(203,195,213,.2);">
        <div style="text-align:center;">
          <div style="font-family:'Manrope',sans-serif;font-size:24px;font-weight:900;color:var(--g);">${s.tc}</div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);letter-spacing:.08em;margin-top:4px;">Doğru</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:'Manrope',sans-serif;font-size:24px;font-weight:900;color:var(--r);">${s.tw}</div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);letter-spacing:.08em;margin-top:4px;">Yanlış</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:'Manrope',sans-serif;font-size:24px;font-weight:900;color:var(--p);">${fmt(s.tm)}</div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);letter-spacing:.08em;margin-top:4px;">Süre</div>
        </div>
      </div>
      <div class="insight-card">
        <div class="insight-icon"><span class="material-symbols-outlined" style="color:var(--p);">lightbulb</span></div>
        <p class="insight-text">
          <strong>${s.name}</strong> toplam <strong>${s.tc+s.tw}</strong> soru çözdü.

async function renderFas(){
  const el=$('fas-grid');
  el.style.cssText='display:flex;flex-direction:column;align-items:center;width:100%;gap:16px;padding:4px 0 16px;';
  el.innerHTML='<div class="ld"><div class="sp"></div>Yükleniyor...</div>';

  // Öğrenci listesi henüz yüklenmediyse yükle
  if(!window._allStudents||!window._allStudents.length){
    const snap=await getDocs(query(collection(db,'users'),where('role','==','student'),where('teacherId','==',CU.uid)));
    const arr=[];
    for(const ud of snap.docs){
      const u=ud.data();
      const ss=await getDoc(doc(db,'stats',ud.id));
      const st=ss.exists()?ss.data():{};
      let tc=0,tw=0,tm=0;
      EFFECTIVE_FASIKUL.forEach(f=>{const fs=st[f.id]||{};tc+=fs.correct||0;tw+=fs.wrong||0;tm+=fs.minutes||0;});
      arr.push({uid:ud.id,...u,tc,tw,tm,pct:tc+tw?Math.round(tc/(tc+tw)*100):0,stats:st});
    }
    window._allStudents=arr;
  }

  const students=window._allStudents||[];
  if(!students.length){
    el.innerHTML='<div class="es"><div class="ic">👨‍🎓</div><p>Henüz atanmış öğrenciniz yok.</p></div>';
    return;
  }
  if(!activeStudentUid) activeStudentUid=students[0].uid;
  const sel=students.find(s=>s.uid===activeStudentUid)||students[0];
  activeStudentUid=sel.uid;

  // ── Öğrenci seçici ──
  const chips=students.map(s=>{
    const isActive=s.uid===sel.uid;
    const av=avHTML(s,44,16);
    return`<div onclick="window._selectFasStudent('${s.uid}')" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:10px 14px;border-radius:14px;background:${isActive?'var(--pb)':'var(--s-lowest)'};border:2.5px solid ${isActive?'var(--p)':'transparent'};transition:all .15s;min-width:72px;box-shadow:${isActive?'0 2px 12px rgba(70,21,153,.14)':'none'};">

  // ── Fasikül kartları (seçili öğrenci istatistikleriyle) ──
  const st=sel.stats||{};
  const cards=EFFECTIVE_FASIKUL.map(f=>{
    const fs=st[f.id]||{},c=fs.correct||0,w=fs.wrong||0,m=fs.minutes||0;

        <div style="width:38px;height:38px;border-radius:10px;background:var(--pb);display:flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-weight:900;font-size:15px;color:var(--p);">${f.n}</div>

      </div>

      <div style="font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;color:var(--tx);margin-bottom:3px;line-height:1.3;">${f.t}</div>
      <div style="font-size:11px;color:var(--mu);margin-bottom:14px;">${f.s}</div>
      <div style="height:5px;background:var(--s-high);border-radius:99px;overflow:hidden;margin-bottom:7px;">
        <div style="height:100%;border-radius:99px;background:${barColor};width:${started&&total?pct:started?6:0}%;transition:width .4s;"></div>
      </div>
      ${started?`<div style="font-size:11px;font-weight:700;color:var(--mu);">✅ ${c} · ❌ ${w} · %${pct}</div>`:'<div style="font-size:11px;color:var(--mu);font-style:italic;">Henüz başlanmadı</div>'}

        &nbsp;·&nbsp; ✅ ${sel.tc} Doğru · ❌ ${sel.tw} Yanlış · %${sel.pct}
      </div>

    </div>

      <div style="font-family:'Manrope',sans-serif;font-size:28px;font-weight:900;color:var(--amb);">${sv}</div>

    </div>
    <div style="background:${pct>=70?'#f0fdf4':pct>=40?'var(--pb)':'#fef2f2'};border-radius:14px;padding:14px;text-align:center;">
      <div style="font-size:22px;margin-bottom:4px;">${pct>=80?'🌟':pct>=60?'👍':pct>=40?'📚':'⚠️'}</div>
      <div style="font-size:11px;font-weight:700;color:${pct>=70?'var(--g)':pct>=40?'var(--p)':'var(--r)'};">${pct>=80?'Mükemmel':pct>=60?'İyi':'Başlangıç'}</div>
    </div>

  // Sections breakdown
  const sections = fs.sections || {};
  const secKeys = Object.keys(sections);
  if (secKeys.length > 0) {
    $('km-sections').innerHTML = `
      <div style="font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;color:var(--tx);margin-bottom:12px;">📊 Konu Bazlı Performans</div>
      ${secKeys.map(k => {
        const sec = sections[k];
        const sc = sec.correct || 0, sw = sec.wrong || 0, stotal = sc + sw;
        const spct = stotal ? Math.round(sc / stotal * 100) : 0;
        return `<div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
            <span style="font-size:12px;font-weight:700;color:var(--tx);">${k}</span>
            <span style="font-size:12px;font-weight:800;color:var(--p);">${stotal ? spct + '%' : '—'}</span>
          </div>
          <div style="height:7px;background:var(--s-high);border-radius:99px;overflow:hidden;">

window.toggleFasikul = async function(uid, fid){
  const uSnap = await getDoc(doc(db,'users',uid));
  const uData = uSnap.exists() ? uSnap.data() : {};
  let allowed = uData.allowedFasikul ? [...uData.allowedFasikul] : EFFECTIVE_FASIKUL.map(f=>f.id);
  if(allowed.includes(fid)) allowed = allowed.filter(id=>id!==fid);
  else allowed.push(fid);
  const saveVal = allowed.length === EFFECTIVE_FASIKUL.length ? null : allowed;
  await setDoc(doc(db,'users',uid), {allowedFasikul: saveVal}, {merge:true});
  const s = (window._allStudents||[]).find(x=>x.uid===uid);
  if(s) s.allowedFasikul = saveVal;
  renderAssignSection(uid, saveVal);
};

            </button>
            <button onclick="openLiveWatch('${uid}','${f.f}','${f.t}')" title="Canlı İzle"
              style="flex:1;height:34px;background:var(--pb);color:var(--p);border:1.5px solid var(--pb2);border-radius:9px;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;transition:background .15s;white-space:nowrap;"
              onmouseover="this.style.background='var(--pb2)'" onmouseout="this.style.background='var(--pb)'">
              <span class="material-symbols-outlined" style="font-size:14px;flex-shrink:0;">visibility</span>Canlı
            </button>
          </div>`
          : '<div style="height:34px;flex-shrink:0;"></div>'}
          <button onclick="resetStudentStats('${uid}','${f.id}','${studentName}')"
            style="width:100%;background:#fff1f2;color:#e11d48;border:1.5px solid #fecdd3;border-radius:9px;padding:8px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s;"
            onmouseover="this.style.background='#fecdd3'" onmouseout="this.style.background='#fff1f2'">
            <span class="material-symbols-outlined" style="font-size:15px;">restart_alt</span>İstatistik Sıfırla
          </button>
        </div>
      </div>`;
    }).join('');
  } catch(e) { container.innerHTML = '<div class="es"><p>Veri yüklenemedi.</p></div>'; }
};

window.resetStudentActivity = async function(uid, name) {
  if (!confirm(`${name} adlı öğrencinin tüm yıllık aktivite verisi silinecek. Emin misiniz?`)) return;
  try {
    const ref = doc(db, 'stats', uid);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const data = {...snap.data()};
      delete data.daily;
      await setDoc(ref, data);
    }
    const s = (window._allStudents||[]).find(x=>x.uid===uid);
    if (s) { s.stats = {...(s.stats||{})}; delete s.stats.daily; }
    renderStudentDetail((window._allStudents||[]).find(x=>x.uid===uid)||{uid,name,stats:{},tc:0,tw:0,tm:0,pct:0});
    alert('Aktivite verisi sıfırlandı.');
  } catch(e) { alert('Hata: ' + e.message); }
};

window.clearStudentDrawings = async function(uid, fid) {
  if (!confirm('Bu öğrencinin tüm çizimleri kalıcı olarak silinecek. Emin misiniz?')) return;
  try {
    const { getDatabase, ref: rtRef3, remove } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    const rtdb3 = getDatabase();
    await remove(rtRef3(rtdb3, `savedDrawings/${uid}/${fid}`));
    alert('Çizimler temizlendi.');
  } catch(e) { alert('Hata: ' + e.message); }
};

window.resetStudentStats = async function(uid, fid, studentName) {
  if (!confirm(`${studentName} adlı öğrencinin "${fid}" istatistikleri sıfırlanacak. Emin misiniz?`)) return;
  try {
    const ref = doc(db, 'stats', uid);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      const updated = {...data};
      delete updated[fid];
      delete updated[fid + '_states'];
      await setDoc(ref, updated);
    }
    alert('İstatistikler sıfırlandı.');
    loadAyarlarStats();
  } catch(e) { alert('Hata: ' + e.message); }
};

/* ── Avatar Picker ── */
window.openAvatarPicker = function(uid) {
  document.getElementById('avPickerUid').value = uid;
  document.getElementById('avPickerModal').style.display = 'flex';
};
window.closeAvPicker = function() {
  document.getElementById('avPickerModal').style.display = 'none';
};
window.onAvFile = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 600*1024) { alert('Dosya 600KB\'den küçük olmalı.'); e.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = ev => saveAvatar(document.getElementById('avPickerUid').value, ev.target.result);
  reader.readAsDataURL(file);
};
window.saveAvatar = async function(uid, val) {
  if (!uid) return;
  try {
    const avatarVal = val === null ? null : val;
    await setDoc(doc(db,'users',uid), {avatar: avatarVal}, {merge:true});
    const s = (window._allStudents||[]).find(x=>x.uid===uid);
    if (s) {
      s.avatar = avatarVal;
      const chip = document.getElementById('sb-chip-'+uid);
      if (chip) {
        const dotEl = document.getElementById('live-dot-'+uid);
        const dotStyle = dotEl ? dotEl.style.display : 'none';
        chip.innerHTML = `
          <div style="position:relative;flex-shrink:0;">
            ${avHTML(s,28,11,true)}
            <span id="live-dot-${uid}" style="display:${dotStyle};width:8px;height:8px;border-radius:50%;background:var(--g);border:2px solid #fff;position:absolute;bottom:0;right:0;"></span>
          </div>
          <span style="flex:1;text-align:left;">${s.name.split(' ')[0]}</span>
          <span style="font-size:10px;font-weight:800;color:${s.pct>=70?'var(--g)':s.pct>=40?'var(--amb)':'var(--mu)'};">%${s.pct}</span>`;
      }
    }
    closeAvPicker();
  } catch(err) { alert('Kaydedilemedi: ' + err.message); }
};

</script>
